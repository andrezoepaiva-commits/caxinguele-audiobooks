<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Caxinguele - Abrindo video</title>
</head>
<body style="font-family: sans-serif; padding: 20px; text-align: center; max-width: 600px; margin: 0 auto;">
<h1 id="msg">Abrindo no app YouTube em <span id="cnt">3</span>s...</h1>
<p><a href="intent://www.youtube.com/watch?v=jNQXAC9IVRw#Intent;package=com.google.android.youtube;scheme=https;end" id="link" style="font-size: 24px; display: inline-block; padding: 15px; background: #ff0000; color: white; text-decoration: none; border-radius: 8px; margin: 10px;">Tocar pra abrir agora</a></p>
<hr style="margin: 30px 0;">
<p style="color: #666; font-size: 14px;">So pra configuracao:</p>
<p><button id="stop" style="font-size: 16px; padding: 12px 20px; background: #f0f0f0; border: 1px solid #999; border-radius: 6px;">PARAR redirect (modo configuracao do atalho)</button></p>
<script>
let segundos = 3;
let timer;
let parado = false;
const VIDEO_ID = "jNQXAC9IVRw";
const INTENT_URL = "intent://www.youtube.com/watch?v=" + VIDEO_ID + "#Intent;package=com.google.android.youtube;scheme=https;end";
const FALLBACK_URL = "https://www.youtube.com/watch?v=" + VIDEO_ID;

function tick() {
  if (parado) return;
  segundos--;
  var el = document.getElementById('cnt');
  if (el) el.innerText = segundos;
  if (segundos <= 0) {
    // Tenta abrir no app YouTube via Android Intent
    window.location.href = INTENT_URL;
    // Fallback pra web YouTube se app nao abrir em 2.5s
    setTimeout(function() {
      window.location.href = FALLBACK_URL;
    }, 2500);
  } else {
    timer = setTimeout(tick, 1000);
  }
}

document.getElementById('stop').addEventListener('click', function() {
  parado = true;
  clearTimeout(timer);
  document.getElementById('msg').innerHTML = 'Redirect parado.<br><br>Agora: toque nos 3 pontos do Chrome (canto superior direito) e escolha <b>"Adicionar a tela inicial"</b>.';
  this.style.display = 'none';
});

timer = setTimeout(tick, 1000);
</script>
</body>
</html>
